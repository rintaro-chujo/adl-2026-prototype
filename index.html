<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>モノにこころをあずけておりまして — Poster Maker</title>
  <meta name="description" content="共通のカラーと文字組みはそのまま、あなたのかたちと色で「ものにこころをあずけておりまして」展の告知をつくる。" />
  <!-- OGP: og:image は /poster.png（アクセスのたびに違う一枚を動的生成）。
       デプロイ先のドメインが決まったら絶対 URL を差し替えること。 -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="「ものにこころをあずけておりまして」展 — Poster Maker" />
  <meta property="og:description" content="ひらくたびに、ちがう一枚。あなたのかたちと色で告知ポスターをつくれます。" />
  <meta property="og:image" content="https://adl-2026-prototype.vercel.app/poster.png?size=insta&w=1080" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://adl-2026-prototype.vercel.app/poster.png?size=insta&w=1080" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Shippori+Mincho:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --cream: #F4EFE4;
      --ink: #2C2A26;
      --line: #e2dccd;
      --panel: #fbf8f1;
      --muted: #8b8477;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      height: 100%;
    }

    body {
      font-family: "Shippori Mincho", "Hiragino Mincho ProN", serif;
      color: var(--ink);
      background: #efe9dc;
      display: flex;
      min-height: 100%;
    }

    #app {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    #stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    #canvasWrap {
      position: relative;
      box-shadow: 0 18px 50px rgba(60, 50, 30, .18);
      line-height: 0;
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 82vh;
      max-height: 82dvh;
      width: auto;
      height: auto;
      touch-action: none;
      cursor: crosshair;
      background: var(--cream);
    }

    #hint {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--muted);
      background: rgba(251, 248, 241, .85);
      padding: 6px 14px;
      border-radius: 20px;
      pointer-events: none;
      white-space: nowrap;
      letter-spacing: .04em;
      transition: opacity .4s;
    }

    #panel {
      width: 340px;
      flex: none;
      background: var(--panel);
      border-left: 1px solid var(--line);
      padding: 24px 22px 40px;
      overflow-y: auto;
      max-height: 100vh;
      max-height: 100dvh;
    }

    .brand {
      margin: 0 0 2px;
      font-family: "Shippori Mincho", serif;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: .04em;
    }

    .brand small {
      display: block;
      font-size: 11px;
      letter-spacing: .02em;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.6;
      font-weight: 400;
    }

    h2 {
      font-size: 12px;
      letter-spacing: .14em;
      color: var(--muted);
      margin: 26px 0 12px;
      font-weight: 600;
      text-transform: uppercase;
      font-family: "Cormorant Garamond", serif;
    }

    .seg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .seg.seg3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .seg.seg3 button {
      text-align: center;
      padding: 10px 4px;
    }

    .seg button,
    .sizes button {
      font-family: inherit;
      font-size: 12.5px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 8px;
      cursor: pointer;
      transition: .15s;
      text-align: left;
      line-height: 1.4;
    }

    .sizes {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sizes button {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sizes button .dim {
      color: var(--muted);
      font-size: 10.5px;
      font-family: "Cormorant Garamond", serif;
    }

    #paperRow {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    #paperRow.show {
      display: flex;
    }

    #paperSel {
      flex: none;
      font-family: inherit;
      font-size: 13px;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      cursor: pointer;
    }

    #paperPx {
      color: var(--muted);
      font-size: 11px;
      font-family: "Cormorant Garamond", serif;
    }

    .seg button.active,
    .sizes button.active {
      border-color: var(--ink);
      box-shadow: inset 0 0 0 1px var(--ink);
    }

    .seg button:hover,
    .sizes button:hover {
      border-color: #c9c1ad;
    }

    .swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .swatch {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .12s;
    }

    .swatch:hover {
      transform: scale(1.08);
    }

    .swatch.active {
      border-color: var(--ink);
      box-shadow: 0 0 0 2px var(--panel), 0 0 0 3px var(--ink);
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type=range] {
      flex: 1;
      accent-color: var(--ink);
    }

    .val {
      font-size: 11px;
      color: var(--muted);
      width: 34px;
      text-align: right;
      font-family: "Cormorant Garamond", serif;
    }

    #lineWidthRow {
      display: none;
      margin-top: 10px;
    }

    #lineWidthRow.show {
      display: flex;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 6px;
    }

    .actions button {
      font-family: inherit;
      font-size: 12.5px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid var(--line);
      background: #fff;
      transition: .15s;
    }

    .actions button:hover {
      border-color: #c9c1ad;
    }

    #dlBtn {
      grid-column: 1/3;
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
      padding: 13px;
      font-size: 13px;
      letter-spacing: .05em;
    }

    #dlBtn:hover {
      opacity: .88;
    }

    details {
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    summary {
      cursor: pointer;
      font-size: 12px;
      letter-spacing: .12em;
      color: var(--muted);
      font-family: "Cormorant Garamond", serif;
      text-transform: uppercase;
      font-weight: 600;
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::before {
      content: "＋ ";
    }

    details[open] summary::before {
      content: "− ";
    }

    .field {
      margin: 12px 0;
    }

    .field label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
      letter-spacing: .03em;
    }

    .field input,
    .field textarea {
      width: 100%;
      font-family: inherit;
      font-size: 13px;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      resize: vertical;
    }

    .field textarea {
      line-height: 1.5;
    }

    .note {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
      margin: 10px 0 0;
    }

    @media (max-width:820px) {
      #app {
        flex-direction: column;
      }

      #panel {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--line);
        max-height: none;
        order: 2;
        padding: 18px 16px calc(44px + env(safe-area-inset-bottom));
      }

      #stage {
        order: 1;
        padding: 14px 14px 10px;
        flex: none;
        height: 62vh;
        height: 62dvh;
      }

      canvas {
        max-height: calc(62vh - 24px);
        max-height: calc(62dvh - 24px);
        max-width: calc(100vw - 28px);
      }

      #hint {
        font-size: 11px;
        bottom: 10px;
      }

      .brand {
        font-size: 16px;
      }

      h2 {
        margin: 22px 0 10px;
      }

      /* サイズ選択は横スクロールのチップに */
      .sizes {
        flex-direction: row;
        overflow-x: auto;
        gap: 8px;
        padding-bottom: 6px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .sizes::-webkit-scrollbar {
        display: none;
      }

      .sizes button {
        flex: 0 0 auto;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        min-height: 44px;
        white-space: nowrap;
      }

      /* タッチターゲットを 44px 以上に */
      .seg button,
      .actions button {
        min-height: 44px;
        padding: 12px 10px;
      }

      #dlBtn {
        min-height: 50px;
      }

      .swatch {
        width: 44px;
        height: 44px;
      }

      input[type=range] {
        height: 32px;
      }

      .field input,
      .field textarea,
      #paperSel {
        font-size: 16px;
        /* iOS のフォーカスズームを防ぐ */
      }

      #paperSel {
        min-height: 44px;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="stage">
      <div id="canvasWrap">
        <canvas id="c"></canvas>
        <div id="hint">画面をなぞって かたちを描く</div>
      </div>
    </div>

    <aside id="panel">
      <!-- <h1 class="brand">「モノにこころをあずけておりまして」展
        <small>共通のカラーと文字組みはそのまま。<br>あなたのかたちと色で、告知をつくる。</small>
      </h1> -->

      <h2>Size / サイズ</h2>
      <div class="sizes" id="sizes"></div>
      <div id="paperRow">
        <select id="paperSel"></select>
        <span id="paperPx" class="dim"></span>
      </div>

      <h2>Generate / じどうで つくる</h2>
      <div class="seg seg3" id="genmode">
        <button data-gen="auto" class="active">おまかせ</button>
        <button data-gen="blob">ぐうぜん</button>
        <button data-gen="mono">ものの形</button>
      </div>
      <div class="actions" style="margin-top:8px">
        <button id="genBtn">あたらしく つくる</button>
        <button id="animBtn">うごかす</button>
        <button id="gifBtn" style="grid-column:1/3">うごきを GIF で保存</button>
      </div>
      <p class="note">ひらくたびに、ちがう一枚があらわれます。<br>キャンバスをなぞれば、自分のかたちに描きなおせます。</p>

      <!-- 【写真機能：一時的に非表示】あとで復活させる。HTML と、下部の
           「photo controls」JS ブロック、drawmode の「写真移動」ボタンをまとめて有効化すること。
      <h2>Photo / 写真</h2>
      <div class="actions" style="margin-top:0">
        <button id="photoBtn">写真を選ぶ／撮る</button>
        <button id="photoRemoveBtn">写真を消す</button>
      </div>
      <input type="file" id="photoInput" accept="image/*" hidden />
      <div id="photoCtrls" style="display:none">
        <div class="slider-row" style="margin-top:12px">
          <span class="val" style="width:56px;text-align:left;font-family:inherit">拡大</span>
          <input type="range" id="pScale" min="100" max="400" value="100" />
          <span class="val" id="pScaleVal">100</span>
        </div>
        <div class="slider-row" style="margin-top:8px">
          <span class="val" style="width:56px;text-align:left;font-family:inherit">ぼかし</span>
          <input type="range" id="pBlur" min="0" max="100" value="0" />
          <span class="val" id="pBlurVal">0</span>
        </div>
        <div class="slider-row" style="margin-top:8px">
          <span class="val" style="width:56px;text-align:left;font-family:inherit">ベール</span>
          <input type="range" id="pVeil" min="0" max="90" value="25" />
          <span class="val" id="pVeilVal">25</span>
        </div>
        <p class="note">「写真移動」を選ぶと、ドラッグで移動・ピンチで拡大できます。<br>ベールは写真に地色を薄くかけて、文字となじませます。</p>
      </div>
      -->

      <h2>Draw / 描き方</h2>
      <div class="seg" id="drawmode">
        <button data-mode="fill" class="active">面（塗り）</button>
        <button data-mode="line">線</button>
        <!-- 【写真機能：一時的に非表示】復活時に戻す
        <button data-mode="photo">写真移動</button>
        -->
      </div>
      <div class="slider-row" id="lineWidthRow">
        <input type="range" id="lineW" min="1" max="16" value="5" />
        <span class="val" id="lineWVal">5</span>
      </div>

      <h2>Fill / 塗り</h2>
      <div class="seg" id="fillmode">
        <button data-mode="shape" class="active">かたちに色</button>
        <button data-mode="background">背景に色</button>
      </div>

      <h2>Color / いろ</h2>
      <div class="swatches" id="swatches"></div>

      <h2>Blur / かたちのぼかし</h2>
      <div class="slider-row">
        <input type="range" id="blur" min="0" max="100" value="0" />
        <span class="val" id="blurVal">0</span>
      </div>
      <p class="note">なぞり終えると、かたちが自ずと ぼやけていきます。<br>好きなところで画面をタップすると 止まります。</p>

      <h2>Actions</h2>
      <div class="actions">
        <!-- <button id="redrawBtn">描き直す</button>
        <button id="stopBtn">ぼかしを止める</button> -->
        <button id="dlBtn">画像を書き出す（PNG）</button>
      </div>

      <p class="note" style="margin-top:16px">「somehow, my heart is
        …」の英文は、キャンバス上でドラッグして好きな場所に動かせます。</p>
    </aside>
  </div>

  <script>
    (() => {
      "use strict";

      const CREAM = "#F4EFE4";
      const INK = "#2C2A26";
      const SERIF = '"Cormorant Garamond", Georgia, serif';
      const MINCHO = '"Shippori Mincho","Hiragino Mincho ProN",serif';

      const PALETTE = [
        { name: "珊瑚", hex: "#C75C5C" },
        { name: "空", hex: "#A6CFE3" },
        { name: "桜", hex: "#F1C4D1" },
        { name: "陽", hex: "#EFD884" },
        { name: "若草", hex: "#A9C56C" },
        { name: "藤", hex: "#C9C6E4" },
        { name: "墨", hex: "#3B3A38" },
      ];

      // 文字組みは共通デザインの SVG（assets/）をそのまま描画する。
      // 旧サイズ（正方形・9:16 など）は SVG が用意でき次第復活させる想定で一旦非表示。
      const PPI = 300;                       // 印刷解像度
      const PREVIEW_MAX = 2200;              // プレビュー Canvas の長辺上限（px）
      const mmToPx = mm => Math.round(mm / 25.4 * PPI);
      // ポスターの用紙サイズ（縦位置・mm）。書き出しは 300ppi のフル解像度。
      const PAPER = [
        { id: "a4", label: "A4", mm: [210, 297] },
        { id: "a3", label: "A3", mm: [297, 420] },
        { id: "a2", label: "A2", mm: [420, 594] },
        { id: "a1", label: "A1", mm: [594, 841] },
        { id: "b3", label: "B3", mm: [364, 515] },
        { id: "b2", label: "B2", mm: [515, 728] },
        { id: "b1", label: "B1", mm: [728, 1030] },
      ];
      const SIZES = [
        { id: "poster", label: "ポスター 縦", sub: "印刷用 300ppi", svg: "assets/poster.svg", paper: true },
        { id: "insta", label: "Instagram", sub: "4:5 縦型投稿", svg: "assets/insta.svg", w: 1080, h: 1350 },
        { id: "hp-top", label: "HP トップ", sub: "サイト掲載用", svg: "assets/hp-top.svg", w: 1196, h: 898 },
        { id: "hp-detailed", label: "HP 詳細", sub: "サイト掲載用", svg: "assets/hp-detailed.svg", w: 1288, h: 644 },
      ];
      const paperById = id => PAPER.find(p => p.id === id) || PAPER[2];

      const state = {
        size: SIZES[0],
        paperId: "a2",       // ポスターの用紙サイズ（書き出し解像度）
        exportScale: 1,      // フル解像度 / プレビュー解像度
        color: PALETTE[0].hex,
        fillMode: "shape",   // 'shape' | 'background'
        tool: "fill",        // ポインタの役割: 'fill' | 'line' | 'photo'
        shapeMode: "fill",   // 描いたかたちの描画スタイル: 'fill' | 'line'
        lineW: 0.005,        // stroke width as fraction of W
        points: [],
        phase: "idle",       // idle | drawing | blurring | done
        blur: 0,
        maxBlur: 0,
        photo: { img: null, scale: 1, ox: 0, oy: 0, blur: 0, veil: 0.25 },
        someOff: { x: 0, y: 0 }, // "somehow, my heart is…" のドラッグ移動量（キャンバス座標）
      };

      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const hint = document.getElementById("hint");
      let raf = null;

      // 選択中サイズのフル（書き出し）解像度
      function fullDims() {
        if (state.size.paper) {
          const p = paperById(state.paperId);
          return { w: mmToPx(p.mm[0]), h: mmToPx(p.mm[1]) };
        }
        return { w: state.size.w, h: state.size.h };
      }

      // プレビュー Canvas は軽量な固定解像度。書き出しは fullDims() を使い、
      // 描画は全てプレビュー座標で行い、書き出し時に exportScale 倍で拡大する。
      function applySize() {
        const full = fullDims();
        const k = Math.min(1, PREVIEW_MAX / Math.max(full.w, full.h));
        canvas.width = Math.max(1, Math.round(full.w * k));
        canvas.height = Math.max(1, Math.round(full.h * k));
        state.exportScale = full.w / canvas.width;
        state.maxBlur = canvas.width * 0.075;
        render();
      }

      // 用紙サイズだけ変更（アスペクトはほぼ同一なのでプレビューは再構築せず、
      // 書き出し倍率のみ更新して描いたかたち・写真位置を保つ）
      function updateExportScale() {
        state.exportScale = fullDims().w / canvas.width;
      }

      // ---------- SVG 文字組みアート ----------
      // 文字組みはデザイナー支給の SVG をそのまま使う。
      // <img> 経由の SVG は外部フォントを読めないため、Google Fonts から
      // 使用グリフだけをサブセット取得し、data URI で SVG に埋め込む。
      const ART = { base: null, some: null, someBBox: null, loading: false, white: false };
      const svgCache = {};
      let FONTCSS = "";

      // 「背景に色」で赤（珊瑚）または黒（墨）のときは文字を白にする。
      const WHITE_TEXT_COLORS = new Set(["#C75C5C", "#3B3A38"]);
      function textIsWhite() {
        return state.fillMode === "background" && WHITE_TEXT_COLORS.has(state.color);
      }

      async function fetchSvg(url) {
        if (!svgCache[url]) {
          // まず HTML に埋め込んだ SVG を使う（file:// でも fetch なしで動く）。
          const inline = document.querySelector(`script[data-svg="${url}"]`);
          if (inline) svgCache[url] = inline.textContent.trim();
          else svgCache[url] = await fetch(url).then(r => r.text());
        }
        return svgCache[url];
      }

      function b64(buf) {
        const u8 = new Uint8Array(buf);
        let s = "";
        const CH = 0x8000;
        for (let i = 0; i < u8.length; i += CH) s += String.fromCharCode.apply(null, u8.subarray(i, i + CH));
        return btoa(s);
      }

      async function buildFontCss(allText) {
        const families = [
          ["Cormorant Infant", "400;500;700"],
          ["Shippori Mincho", "400;500;700"],
        ];
        let css = "";
        for (const [fam, wts] of families) {
          const api = `https://fonts.googleapis.com/css2?family=${fam.replace(/ /g, "+")}:wght@${wts}&text=${encodeURIComponent(allText)}`;
          let c = await fetch(api).then(r => r.text());
          const urls = [...new Set([...c.matchAll(/url\((https:[^)]+)\)/g)].map(m => m[1]))];
          for (const u of urls) {
            const buf = await fetch(u).then(x => x.arrayBuffer());
            c = c.split(u).join(`data:font/woff2;base64,${b64(buf)}`);
          }
          css += c + "\n";
        }
        return css;
      }

      function svgToImg(markup) {
        return new Promise((res, rej) => {
          const blob = new Blob([markup], { type: "image/svg+xml" });
          const url = URL.createObjectURL(blob);
          const im = new Image();
          im.onload = () => { URL.revokeObjectURL(url); res(im); };
          im.onerror = e => { URL.revokeObjectURL(url); rej(e); };
          im.src = url;
        });
      }

      const isSomehow = t => /somehow/.test(t.textContent);

      // SVG マークアップ（viewBox 基準のベクター）を指定 px にラスタライズ。
      // width/height を差し替えるだけで任意解像度で鮮明に描ける（書き出しで再利用）。
      function rasterizeArt(markup, w, h) {
        const sized = markup
          .replace(/\swidth="[^"]*"/, ` width="${w}"`)
          .replace(/\sheight="[^"]*"/, ` height="${h}"`);
        return svgToImg(sized);
      }

      async function loadArt(size) {
        ART.loading = true;
        ART.base = ART.some = ART.someBBox = null;
        const pw = canvas.width, ph = canvas.height;   // プレビュー解像度で描く
        const raw = await fetchSvg(size.svg);
        const doc = new DOMParser().parseFromString(raw, "image/svg+xml");
        const root = doc.documentElement;
        root.setAttribute("width", pw);
        root.setAttribute("height", ph);
        const styleEl = root.querySelector("style");
        // ATC-… は Illustrator の合成フォント。グリフ単位のフォールバックで
        // 欧文・数字 → Cormorant Infant、和文 → Shippori Mincho に振り分ける
        // （Cormorant に無いグリフだけが Shippori に落ちる）。太字はタイトル等が
        // SVG 側で明示する font-weight:700 のみ。
        styleEl.textContent = FONTCSS + styleEl.textContent
          .replace(/font-family:\s*ATC-[^;]+;/g, "font-family:'Cormorant Infant','Shippori Mincho',serif;");

        // "somehow…" を分離して、ベースと可動テキストの2枚に
        const baseRoot = root.cloneNode(true);
        const someRoot = root.cloneNode(true);
        [...baseRoot.querySelectorAll("text")].filter(isSomehow).forEach(t => t.remove());
        [...someRoot.children].forEach(ch => {
          if (ch.tagName === "defs") return;
          if (ch.tagName === "text" && isSomehow(ch)) return;
          ch.remove();
        });
        const ser = el => new XMLSerializer().serializeToString(el);
        // 背景が赤／黒のときは、SVG の文字色（濃いグレー）を白に差し替える。
        // #3f3b3a=ポスター, #3e3a39=インスタ の fill/stroke を対象。
        const white = textIsWhite();
        const recolor = m => white
          ? m.replace(/#3f3b3a/gi, "#ffffff").replace(/#3e3a39/gi, "#ffffff")
          : m;
        // 書き出し時に任意解像度で再ラスタライズできるようマークアップを保持
        ART.baseMarkup = recolor(ser(baseRoot));
        ART.someMarkup = recolor(ser(someRoot));
        ART.white = white;
        const [baseImg, someImg] = await Promise.all([
          rasterizeArt(ART.baseMarkup, pw, ph),
          rasterizeArt(ART.someMarkup, pw, ph),
        ]);

        // "somehow…" の当たり判定用 bbox を実測（transform 込みで取るため画面座標から換算）
        const holder = document.createElement("div");
        holder.style.cssText = "position:absolute;left:-99999px;top:0;visibility:hidden;";
        holder.innerHTML = ser(root);
        document.body.appendChild(holder);
        try { await document.fonts.ready; } catch (e) { }
        const hsvg = holder.querySelector("svg");
        const hEl = [...holder.querySelectorAll("text")].find(isSomehow);
        if (hsvg && hEl) {
          const sr = hsvg.getBoundingClientRect();
          const tr = hEl.getBoundingClientRect();
          const sx = pw / sr.width, sy = ph / sr.height;
          ART.someBBox = {
            x: (tr.left - sr.left) * sx, y: (tr.top - sr.top) * sy,
            w: tr.width * sx, h: tr.height * sy
          };
        }
        holder.remove();
        ART.base = baseImg;
        ART.some = someImg;
        ART.loading = false;
      }

      function somehowHit(p) {
        const b = ART.someBBox;
        if (!b) return false;
        const pad = canvas.width * 0.02;
        const x = b.x + state.someOff.x, y = b.y + state.someOff.y;
        return p.x >= x - pad && p.x <= x + b.w + pad && p.y >= y - pad && p.y <= y + b.h + pad;
      }

      // ---------- shape path ----------
      // k: 座標の倍率（縮小レイヤーや GIF 書き出しで使う。既定 1 = プレビュー座標のまま）
      function tracePath(c, pts, close, k = 1) {
        c.beginPath();
        c.moveTo(pts[0].x * k, pts[0].y * k);
        if (pts.length < 3) {
          c.lineTo(pts[pts.length - 1].x * k, pts[pts.length - 1].y * k);
        } else {
          for (let i = 1; i < pts.length - 1; i++) {
            const mx = (pts[i].x + pts[i + 1].x) / 2, my = (pts[i].y + pts[i + 1].y) / 2;
            c.quadraticCurveTo(pts[i].x * k, pts[i].y * k, mx * k, my * k);
          }
          const last = pts[pts.length - 1];
          if (close) {
            c.quadraticCurveTo(last.x * k, last.y * k, pts[0].x * k, pts[0].y * k);
            c.closePath();
          } else {
            c.lineTo(last.x * k, last.y * k);
          }
        }
      }

      // canvas の filter=blur() は CTM でスケールされず出力ピクセルの絶対量として
      // 適用される。書き出し（composeAt）は ctx.scale(sc) で拡大描画するため、
      // ぼかし半径だけは別途 sc 倍しないとプレビューより弱くなる（下記で設定）。
      let blurScale = 1;

      // ---------- background photo ----------
      // すべてプレビュー座標で描く（W,H はプレビュー Canvas の寸法）。
      // 書き出し時は呼び出し側で ctx.scale(exportScale) 済み。
      function drawPhoto(c, W, H) {
        const ph = state.photo;
        if (!ph.img) return;
        const iw = ph.img.width, ih = ph.img.height;
        const s = Math.max(W / iw, H / ih) * ph.scale;
        const dw = iw * s, dh = ih * s;
        const cx = W / 2 + ph.ox, cy = H / 2 + ph.oy;
        const b = ph.blur * state.maxBlur;
        c.save();
        // filter はプレビュー座標のぼかし量 b を出力解像度に合わせて blurScale 倍する。
        if (b * blurScale > 0.2) c.filter = `blur(${b * blurScale}px)`;
        // ぼかしで端が透けないよう、少し大きめに描く（pad はプレビュー座標のジオメトリ）
        const pad = b * 1.5;
        c.drawImage(ph.img, cx - dw / 2 - pad, cy - dh / 2 - pad, dw + pad * 2, dh + pad * 2);
        c.restore();
        // ベール：地色を薄くかけて文字となじませる
        if (ph.veil > 0) {
          c.save();
          c.globalAlpha = ph.veil;
          c.fillStyle = state.fillMode === "background" ? state.color : CREAM;
          c.fillRect(0, 0, W, H);
          c.restore();
        }
      }

      // かたちを描くコア。k は座標倍率（縮小レイヤー・GIF 用）、
      // S は描画状態（省略時は state。GIF ではフレームごとの値を渡す）。
      function drawShapeInto(c, W, k = 1, S = state) {
        const pts = S.points;
        if (pts.length < 2) return;
        const paint = S.fillMode === "background" ? CREAM : S.color;
        c.save();
        if (S.blur * k * blurScale > 0.2) c.filter = `blur(${S.blur * k * blurScale}px)`;
        if (S.shapeMode === "line") {
          c.strokeStyle = paint;
          c.lineWidth = Math.max(2 * k, S.lineW * W * k);
          c.lineCap = "round"; c.lineJoin = "round";
          tracePath(c, pts, false, k);
          c.stroke();
        } else if (pts.length < 3) {
          c.strokeStyle = paint;
          c.lineWidth = Math.max(6 * k, W * 0.02 * k);
          c.lineCap = "round"; c.lineJoin = "round";
          tracePath(c, pts, false, k);
          c.stroke();
        } else {
          c.fillStyle = paint;
          tracePath(c, pts, true, k);
          c.fill();
        }
        c.restore();
      }
      function drawShape(c, W) { drawShapeInto(c, W); }

      // アニメ再生中は、ぼかしを縮小レイヤー上で計算してから拡大描画する
      // （フル解像度の blur フィルタは 1 フレームごとには重すぎるため）。
      let animLayer = null;
      function drawShapeFast(c, W, H) {
        const k = 0.35;
        const w = Math.max(1, Math.round(W * k)), h = Math.max(1, Math.round(H * k));
        if (!animLayer) animLayer = document.createElement("canvas");
        if (animLayer.width !== w || animLayer.height !== h) { animLayer.width = w; animLayer.height = h; }
        const lc = animLayer.getContext("2d");
        lc.clearRect(0, 0, w, h);
        drawShapeInto(lc, W, w / W);
        c.drawImage(animLayer, 0, 0, W, H);
      }

      // シーン全体を任意の ctx / プレビュー寸法で描く。
      // forExport: プレースホルダ（「ここにかたちを描く」）を出さない。
      // skipArt: 文字組み（SVG）は描かない（書き出し時にフル解像度で別途描くため）。
      function drawScene(c, W, H, forExport, skipArt) {
        const bg = state.fillMode === "background" ? state.color : CREAM;
        c.clearRect(0, 0, W, H);
        c.fillStyle = bg;
        c.fillRect(0, 0, W, H);

        drawPhoto(c, W, H);
        if (!forExport && ANIM.playing) drawShapeFast(c, W, H);
        else drawShape(c, W);

        if (!forExport && state.points.length === 0 && state.phase === "idle" && !state.photo.img) {
          c.save();
          c.fillStyle = "rgba(120,112,96,.28)";
          c.font = `${Math.round(W * 0.02)}px ${MINCHO}`;
          c.textAlign = "center"; c.textBaseline = "middle";
          c.fillText("ここに かたちを 描く", W / 2, H * 0.52);
          c.restore();
        }

        // 文字組み（SVG）: ベース + 可動の "somehow…"
        if (!skipArt) {
          if (ART.base) c.drawImage(ART.base, 0, 0, W, H);
          if (ART.some) c.drawImage(ART.some, state.someOff.x, state.someOff.y, W, H);
        }
      }

      function render() {
        drawScene(ctx, canvas.width, canvas.height, false);
      }

      // ---------- pointer ----------
      function toCanvas(e) {
        const r = canvas.getBoundingClientRect();
        return {
          x: (e.clientX - r.left) * (canvas.width / r.width),
          y: (e.clientY - r.top) * (canvas.height / r.height)
        };
      }

      // 写真移動ツール用: アクティブなポインタを追跡（ピンチ対応）
      const activePtrs = new Map();
      // "somehow…" ドラッグ中の状態
      let dragText = null;

      canvas.addEventListener("pointerdown", e => {
        try { canvas.setPointerCapture(e.pointerId); } catch (err) { }
        // 自動再生中はまずタップで停止（その時点の一枚で止まる）
        if (ANIM.playing) { stopAnim(); showHint("とまりました。書き出しも、なぞって描きなおすこともできます"); return; }
        if (state.phase === "blurring") { stopBlur(); return; }
        const p = toCanvas(e);
        // 英文 "somehow…" の上なら、ツールに関係なくドラッグで移動
        if (activePtrs.size === 0 && somehowHit(p)) {
          dragText = { sx: p.x, sy: p.y, ox: state.someOff.x, oy: state.someOff.y };
          hideHint();
          return;
        }
        if (state.tool === "photo" && state.photo.img) {
          activePtrs.set(e.pointerId, p);
          hideHint();
          return;
        }
        state.points = [p];
        state.phase = "drawing";
        state.blur = 0;
        syncBlurUI();
        hideHint();
        render();
      });
      canvas.addEventListener("pointermove", e => {
        if (dragText) {
          const p = toCanvas(e);
          state.someOff.x = dragText.ox + (p.x - dragText.sx);
          state.someOff.y = dragText.oy + (p.y - dragText.sy);
          render();
          return;
        }
        if (state.tool === "photo" && state.photo.img && activePtrs.has(e.pointerId)) {
          const p = toCanvas(e);
          const ph = state.photo;
          if (activePtrs.size === 2) {
            // ピンチ: 2点の距離比で拡大縮小、中点を支点に
            const ids = [...activePtrs.keys()];
            const otherId = ids[0] === e.pointerId ? ids[1] : ids[0];
            const other = activePtrs.get(otherId);
            const prev = activePtrs.get(e.pointerId);
            const d0 = Math.hypot(prev.x - other.x, prev.y - other.y);
            const d1 = Math.hypot(p.x - other.x, p.y - other.y);
            if (d0 > 0) {
              const r = Math.min(4 / ph.scale, Math.max(0.35 / ph.scale, d1 / d0));
              const mx = (p.x + other.x) / 2, my = (p.y + other.y) / 2;
              const pcx = canvas.width / 2 + ph.ox, pcy = canvas.height / 2 + ph.oy;
              ph.ox = mx + (pcx - mx) * r - canvas.width / 2;
              ph.oy = my + (pcy - my) * r - canvas.height / 2;
              ph.scale = Math.min(4, Math.max(0.35, ph.scale * r));
              syncPhotoUI();
            }
          } else {
            const prev = activePtrs.get(e.pointerId);
            ph.ox += p.x - prev.x;
            ph.oy += p.y - prev.y;
          }
          activePtrs.set(e.pointerId, p);
          render();
          return;
        }
        const p = toCanvas(e);
        if (state.phase !== "drawing") {
          // ホバー時のカーソル: "somehow…" の上では移動カーソルに
          canvas.style.cursor = somehowHit(p) ? "move" : "crosshair";
          return;
        }
        const last = state.points[state.points.length - 1];
        if (!last || Math.hypot(p.x - last.x, p.y - last.y) > canvas.width * 0.004) {
          state.points.push(p);
          render();
        }
      });
      function endStroke(e) {
        if (dragText) { dragText = null; return; }
        if (e && activePtrs.has(e.pointerId)) { activePtrs.delete(e.pointerId); return; }
        if (state.phase !== "drawing") return;
        if (state.points.length < 2) { state.phase = "idle"; render(); return; }
        state.phase = "blurring";
        cancelAnimationFrame(raf);
        const step = state.maxBlur / 150;
        const tick = () => {
          if (state.phase !== "blurring") return;
          state.blur = Math.min(state.maxBlur, state.blur + step);
          syncBlurUI();
          render();
          if (state.blur >= state.maxBlur) { state.phase = "done"; return; }
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        showHint("好きなところで タップして 止める");
      }
      canvas.addEventListener("pointerup", endStroke);
      canvas.addEventListener("pointercancel", endStroke);

      function stopBlur() {
        if (state.phase === "blurring") {
          cancelAnimationFrame(raf);
          state.phase = "done";
          showHint("できあがり。書き出せます");
          render();
        }
      }

      function showHint(txt) { hint.textContent = txt; hint.style.opacity = 1; }
      function hideHint() { hint.style.opacity = 0; }

      // ---------- controls ----------
      const paperRow = document.getElementById("paperRow");
      const paperSel = document.getElementById("paperSel");
      const paperPx = document.getElementById("paperPx");

      PAPER.forEach(p => {
        const o = document.createElement("option");
        o.value = p.id; o.textContent = p.label;
        paperSel.appendChild(o);
      });
      paperSel.value = state.paperId;

      function updatePaperPx() {
        const d = fullDims();
        paperPx.textContent = `${d.w} × ${d.h} px / ${PPI}ppi`;
      }

      paperSel.onchange = () => {
        state.paperId = paperSel.value;
        updateExportScale();   // プレビューは維持、書き出し倍率のみ更新
        updatePaperPx();
      };

      const sizesEl = document.getElementById("sizes");
      SIZES.forEach((s, i) => {
        const b = document.createElement("button");
        const dim = s.paper ? "" : `<span class="dim">${s.w}×${s.h}</span>`;
        b.innerHTML = `<span>${s.label}<br><span class="dim" style="font-family:${MINCHO}">${s.sub}</span></span>${dim}`;
        if (i === 0) b.classList.add("active");
        b.onclick = () => {
          stopAnim(); // アスペクトが変わるので自動再生は止める
          [...sizesEl.children].forEach(x => x.classList.remove("active"));
          b.classList.add("active");
          state.size = s;
          state.points = []; state.phase = "idle"; state.blur = 0;
          state.photo.ox = 0; state.photo.oy = 0; // 比率が変わるので写真は中央に戻す
          state.someOff.x = 0; state.someOff.y = 0; // 英文はサイズごとの定位置に戻す
          paperRow.classList.toggle("show", !!s.paper);
          updatePaperPx();
          syncBlurUI(); applySize();
          generatePoster(); // 新しいサイズでも一枚を用意しておく
          loadArt(s).then(render).catch(err => console.error(err));
          showHint("きょうの一枚。なぞって 描きなおすこともできます");
        };
        sizesEl.appendChild(b);
      });
      // 初期表示（ポスターが既定）
      paperRow.classList.toggle("show", !!state.size.paper);
      updatePaperPx();

      document.querySelectorAll("#drawmode button").forEach(b => {
        b.onclick = () => {
          const mode = b.dataset.mode;
          if (mode === "photo" && !state.photo.img) {
            // 写真がまだなければ選択ダイアログへ
            document.getElementById("photoInput").click();
            return;
          }
          document.querySelectorAll("#drawmode button").forEach(x => x.classList.remove("active"));
          b.classList.add("active");
          state.tool = mode;
          if (mode !== "photo") state.shapeMode = mode; // 既存のかたちも面⇄線で切替
          document.getElementById("lineWidthRow").classList.toggle("show", mode === "line");
          if (mode === "photo") showHint("ドラッグで移動・ピンチで拡大");
          render();
        };
      });

      /* ---------- photo controls【一時的に無効化】あとで復活させる。
         上部の Photo / 写真 の HTML と drawmode の「写真移動」ボタンも合わせて有効化すること。
         この機能は drawScene()->drawPhoto() や pointer ハンドラの state.tool==="photo" 分岐、
         state.photo（既に保持）と連動する。

      const photoInput = document.getElementById("photoInput");
      const photoCtrls = document.getElementById("photoCtrls");
      const pScale = document.getElementById("pScale"), pScaleVal = document.getElementById("pScaleVal");
      const pBlur = document.getElementById("pBlur"), pBlurVal = document.getElementById("pBlurVal");
      const pVeil = document.getElementById("pVeil"), pVeilVal = document.getElementById("pVeilVal");

      function syncPhotoUI() {
        pScale.value = Math.round(state.photo.scale * 100);
        pScaleVal.textContent = pScale.value;
        pBlur.value = Math.round(state.photo.blur * 100);
        pBlurVal.textContent = pBlur.value;
        pVeil.value = Math.round(state.photo.veil * 100);
        pVeilVal.textContent = pVeil.value;
      }

      function selectTool(mode) {
        const btn = document.querySelector(`#drawmode button[data-mode="${mode}"]`);
        document.querySelectorAll("#drawmode button").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        state.tool = mode;
        if (mode !== "photo") state.shapeMode = mode;
        document.getElementById("lineWidthRow").classList.toggle("show", mode === "line");
      }

      document.getElementById("photoBtn").onclick = () => photoInput.click();

      photoInput.onchange = async e => {
        const f = e.target.files && e.target.files[0];
        if (!f) return;
        let img = null;
        try {
          img = await createImageBitmap(f, { imageOrientation: "from-image" });
        } catch (err) {
          img = await new Promise((res, rej) => {
            const u = URL.createObjectURL(f);
            const im = new Image();
            im.onload = () => res(im);
            im.onerror = rej;
            im.src = u;
          }).catch(() => null);
        }
        photoInput.value = "";
        if (!img) return;
        // 大きすぎる写真は縮小してパフォーマンスを確保
        const MAXDIM = 2400;
        if (Math.max(img.width, img.height) > MAXDIM) {
          const r = MAXDIM / Math.max(img.width, img.height);
          const oc = document.createElement("canvas");
          oc.width = Math.round(img.width * r);
          oc.height = Math.round(img.height * r);
          oc.getContext("2d").drawImage(img, 0, 0, oc.width, oc.height);
          img = oc;
        }
        state.photo.img = img;
        state.photo.scale = 1;
        state.photo.ox = 0;
        state.photo.oy = 0;
        photoCtrls.style.display = "block";
        syncPhotoUI();
        selectTool("photo");
        showHint("ドラッグで移動・ピンチで拡大");
        render();
      };

      document.getElementById("photoRemoveBtn").onclick = () => {
        state.photo.img = null;
        photoCtrls.style.display = "none";
        if (state.tool === "photo") selectTool("fill");
        render();
      };

      pScale.oninput = () => {
        state.photo.scale = pScale.value / 100;
        pScaleVal.textContent = pScale.value;
        render();
      };
      pBlur.oninput = () => {
        state.photo.blur = pBlur.value / 100;
        pBlurVal.textContent = pBlur.value;
        render();
      };
      pVeil.oninput = () => {
        state.photo.veil = pVeil.value / 100;
        pVeilVal.textContent = pVeil.value;
        render();
      };
      ---------- photo controls ここまで ---------- */

      const lineWEl = document.getElementById("lineW");
      const lineWVal = document.getElementById("lineWVal");
      lineWEl.oninput = () => {
        state.lineW = lineWEl.value / 1000;
        lineWVal.textContent = lineWEl.value;
        render();
      };

      // 文字色（白⇔通常）の条件が変わったら SVG を再ラスタライズ
      function refreshArtColor() {
        if (!ART.loading && textIsWhite() !== ART.white) {
          loadArt(state.size).then(render).catch(err => console.error(err));
        }
      }

      const swEl = document.getElementById("swatches");
      PALETTE.forEach((p, i) => {
        const s = document.createElement("div");
        s.className = "swatch" + (i === 0 ? " active" : "");
        s.style.background = p.hex; s.title = p.name;
        s.onclick = () => {
          stopAnim(); // 自動再生中の色変化と競合しないように
          [...swEl.children].forEach(x => x.classList.remove("active"));
          s.classList.add("active");
          state.color = p.hex; render(); refreshArtColor();
        };
        swEl.appendChild(s);
      });

      document.querySelectorAll("#fillmode button").forEach(b => {
        b.onclick = () => {
          stopAnim(); // 背景⇄かたちの切替は文字色にも響くので止めてから
          document.querySelectorAll("#fillmode button").forEach(x => x.classList.remove("active"));
          b.classList.add("active");
          state.fillMode = b.dataset.mode; render(); refreshArtColor();
        };
      });

      const blurEl = document.getElementById("blur");
      const blurVal = document.getElementById("blurVal");
      function syncBlurUI() {
        const pct = state.maxBlur ? Math.round(state.blur / state.maxBlur * 100) : 0;
        blurEl.value = pct; blurVal.textContent = pct;
      }
      blurEl.oninput = () => {
        stopAnim();
        cancelAnimationFrame(raf);
        if (state.phase === "blurring" || state.phase === "drawing") state.phase = "done";
        state.blur = (blurEl.value / 100) * state.maxBlur;
        blurVal.textContent = blurEl.value;
        render();
      };

      // ボタンは HTML 側でコメントアウト（非表示）されることがあるので、存在時のみ束縛する
      const redrawBtn = document.getElementById("redrawBtn");
      if (redrawBtn) redrawBtn.onclick = () => {
        cancelAnimationFrame(raf);
        state.points = []; state.phase = "idle"; state.blur = 0;
        syncBlurUI(); render();
        showHint("画面をなぞって かたちを描く");
      };
      const stopBtnEl = document.getElementById("stopBtn");
      if (stopBtnEl) stopBtnEl.onclick = stopBlur;

      function exportName() {
        return state.size.paper
          ? `mono-ni-kokoro_poster_${state.paperId.toUpperCase()}_${PPI}ppi.png`
          : `mono-ni-kokoro_${state.size.id}.png`;
      }

      // 指定解像度でシーンをオフスクリーン合成し、PNG Blob を返す（失敗時 null）。
      // 背景・写真・かたちはプレビュー座標を拡大して描き、文字組み（SVG）だけは
      // その解像度で再ラスタライズして鮮明に重ねる（＝テキストは常に 300ppi 相当）。
      async function composeAt(full, cap) {
        const k = Math.min(1, cap / Math.max(full.w, full.h));
        const ow = Math.max(1, Math.round(full.w * k));
        const oh = Math.max(1, Math.round(full.h * k));
        const oc = document.createElement("canvas");
        oc.width = ow; oc.height = oh;
        const octx = oc.getContext("2d");
        if (!octx) return null;
        const sc = ow / canvas.width;
        // 1) 背景・写真・かたち（プレビュー座標を sc 倍で拡大）
        // filter=blur は CTM で拡大されないため blurScale=sc でぼかし半径を合わせる。
        octx.save();
        octx.scale(sc, sc);
        blurScale = sc;
        try {
          drawScene(octx, canvas.width, canvas.height, true, true);
        } finally {
          blurScale = 1;
        }
        octx.restore();
        // 2) 文字組みを出力解像度で再ラスタライズして重ねる
        if (ART.baseMarkup) {
          const [b, s] = await Promise.all([
            rasterizeArt(ART.baseMarkup, ow, oh),
            rasterizeArt(ART.someMarkup, ow, oh),
          ]);
          octx.drawImage(b, 0, 0, ow, oh);
          octx.drawImage(s, state.someOff.x * sc, state.someOff.y * sc, ow, oh);
        }
        const blob = await new Promise(res => oc.toBlob(res, "image/png"));
        return blob;
      }

      // 選択サイズのフル解像度で書き出す。巨大解像度が Canvas 上限に
      // 当たった場合は段階的に縮小して再試行する（メモリ/面積制限対策）。
      async function exportPNG() {
        const dlBtn = document.getElementById("dlBtn");
        const full = fullDims();
        const long = Math.max(full.w, full.h);
        const caps = [long, 8000, 6000, 4000, PREVIEW_MAX].filter((c, i, a) => c <= long && a.indexOf(c) === i);
        dlBtn.textContent = "書き出し中…";
        await new Promise(r => setTimeout(r, 30)); // 「書き出し中…」の表示を反映
        for (let i = 0; i < caps.length; i++) {
          let blob = null;
          try { blob = await composeAt(full, caps[i]); } catch (e) { blob = null; }
          if (!blob) continue;
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.download = exportName();
          a.href = url;
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 2000);
          dlBtn.textContent = "画像を書き出す（PNG）";
          if (i > 0) showHint("端末の上限に合わせて解像度を下げました");
          return;
        }
        dlBtn.textContent = "画像を書き出す（PNG）";
        showHint("この解像度では書き出せませんでした");
      }
      document.getElementById("dlBtn").onclick = exportPNG;

      // ---------- 自動生成: アクセスするたびに違う一枚 ----------
      // ?seed=… を付けると同じ一枚を再現できる（未指定なら毎回ランダム）。
      function hashSeed(str) {
        let h = 1779033703 ^ str.length;
        for (let i = 0; i < str.length; i++) {
          h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
          h = (h << 13) | (h >>> 19);
        }
        return h >>> 0;
      }
      function mulberry32(a) {
        return () => {
          a |= 0; a = (a + 0x6D2B79F5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      const seedParam = new URLSearchParams(location.search).get("seed");
      const rng = mulberry32(seedParam ? hashSeed(seedParam) : crypto.getRandomValues(new Uint32Array(1))[0]);
      const rnd = (a, b) => a + rng() * (b - a);
      const pick = arr => arr[Math.floor(rng() * arr.length)];
      const clamp255 = v => v < 0 ? 0 : v > 255 ? 255 : v;
      function lerpHex(a, b, t) {
        const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
        const r = Math.round(((pa >> 16) & 255) + (((pb >> 16) & 255) - ((pa >> 16) & 255)) * t);
        const g = Math.round(((pa >> 8) & 255) + (((pb >> 8) & 255) - ((pa >> 8) & 255)) * t);
        const bl = Math.round((pa & 255) + ((pb & 255) - (pa & 255)) * t);
        return `#${((r << 16) | (g << 8) | bl).toString(16).padStart(6, "0")}`;
      }

      // 「もの」の輪郭ライブラリ（0..100 の座標、ごく粗い抽象シルエット）。
      // ぼかしと揺らぎでさらに抽象化されるので、輪郭はこの程度で十分。
      const MONO_SHAPES = {
        mug: [[20, 28], [78, 28], [80, 42], [93, 40], [100, 52], [92, 66], [80, 62], [78, 82], [68, 94], [32, 94], [22, 82]],
        umbrella: [[10, 50], [18, 34], [34, 24], [50, 20], [66, 24], [82, 34], [90, 50], [72, 46], [56, 46], [55, 84], [52, 92], [46, 90], [45, 84], [49, 84], [50, 46], [34, 46], [18, 46]],
        key: [[10, 32], [16, 20], [30, 14], [44, 20], [50, 32], [44, 44], [34, 48], [52, 46], [88, 44], [88, 56], [80, 56], [80, 48], [72, 48], [72, 58], [64, 58], [64, 48], [30, 50], [16, 44]],
        book: [[10, 30], [30, 24], [48, 30], [50, 32], [52, 30], [70, 24], [90, 30], [90, 74], [70, 70], [52, 76], [50, 78], [48, 76], [30, 70], [10, 74]],
        chair: [[30, 10], [36, 10], [36, 50], [76, 50], [76, 92], [70, 92], [70, 58], [36, 58], [36, 92], [30, 92]],
        bottle: [[42, 8], [56, 8], [56, 22], [64, 34], [68, 52], [66, 74], [58, 90], [40, 90], [32, 74], [30, 52], [34, 34], [42, 22]],
        shirt: [[36, 16], [46, 20], [54, 20], [64, 16], [86, 28], [78, 44], [68, 40], [68, 88], [32, 88], [32, 40], [22, 44], [14, 28]],
        bowl: [[16, 40], [84, 40], [80, 58], [68, 74], [58, 80], [62, 88], [38, 88], [42, 80], [32, 74], [20, 58]],
      };

      // 輪郭を「中心原点・最長辺 1」に正規化しつつ、等間隔の N 点に増やす。
      // 点が密だと、モーフィングや揺らぎがなめらかにかかる。
      function densify(raw, N, closed = true) {
        let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
        for (const [x, y] of raw) {
          if (x < minX) minX = x; if (x > maxX) maxX = x;
          if (y < minY) minY = y; if (y > maxY) maxY = y;
        }
        const s = 1 / Math.max(1e-9, Math.max(maxX - minX, maxY - minY));
        const ox = (minX + maxX) / 2, oy = (minY + maxY) / 2;
        const pts = raw.map(([x, y]) => ({ x: (x - ox) * s, y: (y - oy) * s }));
        const path = closed ? pts.concat([pts[0]]) : pts;
        const cum = [0];
        for (let i = 1; i < path.length; i++) {
          cum.push(cum[i - 1] + Math.hypot(path[i].x - path[i - 1].x, path[i].y - path[i - 1].y));
        }
        const total = cum[cum.length - 1];
        const out = [];
        let j = 0;
        for (let i = 0; i < N; i++) {
          const d = (closed ? i / N : i / (N - 1)) * total;
          while (j < path.length - 2 && cum[j + 1] < d) j++;
          const t = (d - cum[j]) / Math.max(1e-9, cum[j + 1] - cum[j]);
          out.push({
            x: path[j].x + (path[j + 1].x - path[j].x) * t,
            y: path[j].y + (path[j + 1].y - path[j].y) * t,
          });
        }
        return out;
      }

      function genHarmonics() {
        // 有機的なブロブ: 低次の正弦波を重ねた極座標の輪郭
        const hs = [];
        for (let k = 2; k <= 5; k++) hs.push({ k, a: rnd(0.05, 0.24) / (k * 0.55), ph: rnd(0, Math.PI * 2) });
        return hs;
      }

      const GEN = { mode: "auto" }; // auto | blob | mono
      let lastGen = null;           // { spec, points } 直近の自動生成

      function genShapeSpec() {
        const W = canvas.width, H = canvas.height;
        const mode = GEN.mode === "auto" ? (rng() < 0.5 ? "blob" : "mono") : GEN.mode;
        const spec = {
          cx: W * rnd(0.32, 0.68), cy: H * rnd(0.34, 0.62),
          w0: rng(), phA: rnd(0, Math.PI * 2), phB: rnd(0, Math.PI * 2),
        };
        if (mode === "blob") {
          Object.assign(spec, {
            type: "blob", R: Math.min(W, H) * rnd(0.17, 0.3),
            squash: rnd(0.75, 1.25), rot: rnd(0, Math.PI * 2),
            h1: genHarmonics(), h2: genHarmonics(),
          });
        } else {
          const name = pick(Object.keys(MONO_SHAPES));
          Object.assign(spec, {
            type: "mono", name, base: densify(MONO_SHAPES[name], 64),
            size: Math.min(W, H) * rnd(0.45, 0.66), rot: rnd(-0.22, 0.22),
            amp: rnd(0.012, 0.04),
            m1: 1 + Math.floor(rng() * 3), m2: 1 + Math.floor(rng() * 3),
            f1: 1, f2: rng() < 0.5 ? 1 : 2,
          });
        }
        return spec;
      }

      // 手描きのかたちも揺らせるよう、点列から mono 型の spec を作る
      function specFromPoints(pts) {
        if (!pts || pts.length < 3) return null;
        let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
        for (const p of pts) {
          if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
          if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
        }
        return {
          type: "mono", base: densify(pts.map(p => [p.x, p.y]), 64, state.shapeMode !== "line"),
          cx: (minX + maxX) / 2, cy: (minY + maxY) / 2,
          size: Math.max(1, Math.max(maxX - minX, maxY - minY)), rot: 0,
          amp: rnd(0.012, 0.03),
          m1: 1 + Math.floor(rng() * 3), m2: 1 + Math.floor(rng() * 3),
          f1: 1, f2: rng() < 0.5 ? 1 : 2,
          w0: rng(), phA: rnd(0, Math.PI * 2), phB: rnd(0, Math.PI * 2),
        };
      }

      // spec と位相 w（0..1）からかたちの点列を得る。
      // P（アニメパラメータ）があるときだけ、中心の漂いと回転の揺れを加える。
      // すべて w について周期 1 なので、GIF はシームレスにループする。
      function shapePointsAt(spec, w, P) {
        const TAU = Math.PI * 2;
        let cx = spec.cx, cy = spec.cy;
        let rot = spec.rot;
        if (P) {
          cx += P.driftX * Math.sin(TAU * w + spec.phA);
          cy += P.driftY * Math.sin(TAU * 2 * w + spec.phB);
          rot += 0.1 * Math.sin(TAU * w + spec.phB);
        }
        const cos = Math.cos(rot), sin = Math.sin(rot);
        const u = 0.5 - 0.5 * Math.cos(TAU * w);
        const pts = [];
        if (spec.type === "blob") {
          const R = spec.R * (1 + (P ? 0.05 * Math.sin(TAU * w + spec.phA) : 0));
          const N = 72;
          for (let i = 0; i < N; i++) {
            const th = i / N * TAU;
            let r = 1;
            for (let j = 0; j < spec.h1.length; j++) {
              const a = spec.h1[j].a + (spec.h2[j].a - spec.h1[j].a) * u;
              const ph = spec.h1[j].ph + (spec.h2[j].ph - spec.h1[j].ph) * u;
              r += a * Math.sin(spec.h1[j].k * th + ph);
            }
            const x = Math.cos(th) * R * r, y = Math.sin(th) * R * r * spec.squash;
            pts.push({ x: cx + x * cos - y * sin, y: cy + x * sin + y * cos });
          }
        } else {
          const N = spec.base.length;
          for (let i = 0; i < N; i++) {
            const b = spec.base[i];
            const dx = spec.amp * Math.sin(TAU * spec.f1 * w + i / N * TAU * spec.m1 + spec.phA);
            const dy = spec.amp * Math.sin(TAU * spec.f2 * w + i / N * TAU * spec.m2 + spec.phB);
            const x = (b.x + dx) * spec.size, y = (b.y + dy) * spec.size;
            pts.push({ x: cx + x * cos - y * sin, y: cy + x * sin + y * cos });
          }
        }
        return pts;
      }

      const genBtn = document.getElementById("genBtn");
      const animBtn = document.getElementById("animBtn");
      const gifBtn = document.getElementById("gifBtn");

      function setActiveBtn(sel, key, val) {
        document.querySelectorAll(sel + " button").forEach(b => b.classList.toggle("active", b.dataset[key] === val));
      }
      // 生成結果をパネルの選択状態に反映する
      function syncGeneratedUI() {
        PALETTE.forEach((p, i) => swEl.children[i].classList.toggle("active", p.hex === state.color));
        setActiveBtn("#fillmode", "mode", state.fillMode);
        setActiveBtn("#drawmode", "mode", state.shapeMode);
        document.getElementById("lineWidthRow").classList.toggle("show", state.shapeMode === "line");
        lineWEl.value = Math.round(state.lineW * 1000);
        lineWVal.textContent = lineWEl.value;
      }

      function generatePoster() {
        const wasPlaying = ANIM.playing;
        stopAnim();
        cancelAnimationFrame(raf); // 手描き後のぼかし進行があれば止める
        const spec = genShapeSpec();
        state.color = pick(PALETTE).hex;
        state.fillMode = rng() < 0.3 ? "background" : "shape";
        const line = rng() < 0.18;
        state.shapeMode = line ? "line" : "fill";
        state.tool = state.shapeMode;
        if (line) state.lineW = rnd(3, 9) / 1000;
        state.points = shapePointsAt(spec, spec.w0, null);
        state.phase = "done";
        state.blur = state.maxBlur * rnd(0.15, 0.7);
        lastGen = { spec, points: state.points };
        syncGeneratedUI(); syncBlurUI();
        if (ART.base) refreshArtColor(); // 初回は initArt 側の loadArt が状態を見る
        render();
        if (wasPlaying) startAnim();
      }

      // ---------- 自動再生（うにょうにょ）----------
      const ANIM = { playing: false, t0: 0, params: null, raf: 0 };

      function buildAnim() {
        // 直近の自動生成のままなら blob モーフも効く spec を、
        // 手描きに変わっていれば点列から spec を起こして揺らす。
        const spec = (lastGen && state.points === lastGen.points)
          ? lastGen.spec
          : (specFromPoints(state.points) || genShapeSpec());
        const bgMode = state.fillMode === "background";
        // 背景アニメでは文字が白に切り替わる色（珊瑚・墨）を避ける
        const pool = PALETTE.filter(p => !bgMode || !WHITE_TEXT_COLORS.has(p.hex)).map(p => p.hex);
        let cA = (!bgMode || !WHITE_TEXT_COLORS.has(state.color)) ? state.color : pick(pool);
        let cB = pick(pool), guard = 0;
        while (cB === cA && guard++ < 8) cB = pick(pool);
        return {
          spec, cA, cB,
          T: rnd(6000, 10000),
          blurLo: state.maxBlur * rnd(0.1, 0.28),
          blurHi: state.maxBlur * rnd(0.45, 0.8),
          driftX: canvas.width * rnd(0.01, 0.035),
          driftY: canvas.height * rnd(0.008, 0.025),
        };
      }

      // 位相 w（0..1）のフレーム状態。state は変更しない（GIF 書き出しでも使う）。
      function computeFrame(P, w) {
        const u = 0.5 - 0.5 * Math.cos(w * Math.PI * 2);
        return {
          color: lerpHex(P.cA, P.cB, u),
          fillMode: state.fillMode, shapeMode: state.shapeMode, lineW: state.lineW,
          blur: P.blurLo + (P.blurHi - P.blurLo) * (0.5 - 0.5 * Math.cos(w * 2 * Math.PI * 2)),
          points: shapePointsAt(P.spec, w, P),
        };
      }

      function runAnimLoop() {
        const loop = now => {
          if (!ANIM.playing) return;
          const w = ((now - ANIM.t0) / ANIM.params.T) % 1;
          const F = computeFrame(ANIM.params, w);
          state.color = F.color; state.blur = F.blur; state.points = F.points;
          syncBlurUI(); render();
          ANIM.raf = requestAnimationFrame(loop);
        };
        ANIM.raf = requestAnimationFrame(loop);
      }

      function startAnim() {
        if (ANIM.playing) return;
        cancelAnimationFrame(raf);
        if (state.phase === "blurring" || state.phase === "drawing") state.phase = "done";
        if (state.points.length < 3) generatePoster();
        ANIM.params = buildAnim();
        state.color = ANIM.params.cA;
        if (ART.base) refreshArtColor(); // 白文字状態からの復帰など
        ANIM.playing = true;
        ANIM.t0 = performance.now();
        animBtn.textContent = "とめる";
        runAnimLoop();
        showHint("タップすると とまります");
      }

      function stopAnim() {
        if (!ANIM.playing) return;
        ANIM.playing = false;
        cancelAnimationFrame(ANIM.raf);
        animBtn.textContent = "うごかす";
        syncGeneratedUI(); syncBlurUI();
        render(); // フル解像度のぼかしで描きなおす
      }

      // ---------- GIF 書き出し（依存なしの GIF89a エンコーダ）----------
      const tick = () => new Promise(r => setTimeout(r, 0));

      // メディアンカットで最大 max 色のパレットを作る
      function medianCut(samples, max) {
        let boxes = [samples];
        const widest = box => {
          const mn = [255, 255, 255], mx = [0, 0, 0];
          for (const p of box) for (let c = 0; c < 3; c++) {
            if (p[c] < mn[c]) mn[c] = p[c];
            if (p[c] > mx[c]) mx[c] = p[c];
          }
          let ch = 0, span = -1;
          for (let c = 0; c < 3; c++) if (mx[c] - mn[c] > span) { span = mx[c] - mn[c]; ch = c; }
          return { ch, span };
        };
        while (boxes.length < max) {
          let bi = -1, bw = 0, bch = 0;
          for (let i = 0; i < boxes.length; i++) {
            if (boxes[i].length < 2) continue;
            const { ch, span } = widest(boxes[i]);
            const w = span * Math.log(boxes[i].length + 1);
            if (w > bw) { bw = w; bi = i; bch = ch; }
          }
          if (bi < 0 || bw === 0) break;
          const box = boxes[bi];
          box.sort((a, b) => a[bch] - b[bch]);
          const mid = box.length >> 1;
          boxes.splice(bi, 1, box.slice(0, mid), box.slice(mid));
        }
        return boxes.map(box => {
          let r = 0, g = 0, b = 0;
          for (const p of box) { r += p[0]; g += p[1]; b += p[2]; }
          const n = Math.max(1, box.length);
          return [Math.round(r / n), Math.round(g / n), Math.round(b / n)];
        });
      }

      function nearestIdx(r, g, b, pal, cache) {
        const key = ((r >> 3) << 10) | ((g >> 3) << 5) | (b >> 3);
        const c = cache[key];
        if (c >= 0) return c;
        let best = 0, bd = 1e9;
        for (let i = 0; i < pal.length; i++) {
          const dr = r - pal[i][0], dg = g - pal[i][1], db = b - pal[i][2];
          const d = dr * dr + dg * dg + db * db;
          if (d < bd) { bd = d; best = i; }
        }
        cache[key] = best;
        return best;
      }

      // Floyd–Steinberg ディザでインデックス列に落とす
      function ditherToIndex(img, pal, cache) {
        const w = img.width, h = img.height, d = img.data;
        const idx = new Uint8Array(w * h);
        const row = (w + 2) * 3;
        const E = new Float32Array(row * 2);
        let cur = 0, nxt = row;
        for (let y = 0; y < h; y++) {
          E.fill(0, nxt, nxt + row);
          for (let x = 0; x < w; x++) {
            const di = (y * w + x) * 4;
            const eo = cur + (x + 1) * 3;
            const r = clamp255(Math.round(d[di] + E[eo]));
            const g = clamp255(Math.round(d[di + 1] + E[eo + 1]));
            const b = clamp255(Math.round(d[di + 2] + E[eo + 2]));
            const pi = nearestIdx(r, g, b, pal, cache);
            idx[y * w + x] = pi;
            const er = r - pal[pi][0], eg = g - pal[pi][1], eb = b - pal[pi][2];
            const R1 = cur + (x + 2) * 3, D0 = nxt + x * 3, D1 = nxt + (x + 1) * 3, D2 = nxt + (x + 2) * 3;
            E[R1] += er * 0.4375; E[R1 + 1] += eg * 0.4375; E[R1 + 2] += eb * 0.4375;
            E[D0] += er * 0.1875; E[D0 + 1] += eg * 0.1875; E[D0 + 2] += eb * 0.1875;
            E[D1] += er * 0.3125; E[D1 + 1] += eg * 0.3125; E[D1 + 2] += eb * 0.3125;
            E[D2] += er * 0.0625; E[D2 + 1] += eg * 0.0625; E[D2 + 2] += eb * 0.0625;
          }
          const t = cur; cur = nxt; nxt = t;
        }
        return idx;
      }

      // GIF の LZW 圧縮（最小コードサイズ 8）
      function lzwEncode(indices) {
        const MIN = 8, CLEAR = 256, EOI = 257;
        const bytes = [MIN];
        const block = new Uint8Array(255);
        let blen = 0, acc = 0, accBits = 0, codeSize = MIN + 1;
        const flushBlock = () => {
          if (!blen) return;
          bytes.push(blen);
          for (let i = 0; i < blen; i++) bytes.push(block[i]);
          blen = 0;
        };
        const emitByte = b => { block[blen++] = b; if (blen === 255) flushBlock(); };
        const emit = code => {
          acc |= code << accBits;
          accBits += codeSize;
          while (accBits >= 8) { emitByte(acc & 255); acc >>>= 8; accBits -= 8; }
        };
        let dict = new Map(), next = EOI + 1;
        const reset = () => { dict = new Map(); next = EOI + 1; codeSize = MIN + 1; };
        emit(CLEAR);
        let prefix = indices[0];
        for (let i = 1; i < indices.length; i++) {
          const c = indices[i];
          const key = (prefix << 8) | c;
          const hit = dict.get(key);
          if (hit !== undefined) { prefix = hit; continue; }
          emit(prefix);
          dict.set(key, next++);
          if (next === 4096) { emit(CLEAR); reset(); }
          else if (next === (1 << codeSize) + 1) codeSize++;
          prefix = c;
        }
        emit(prefix);
        emit(EOI);
        while (accBits > 0) { emitByte(acc & 255); acc >>>= 8; accBits -= 8; }
        flushBlock();
        bytes.push(0); // ブロック終端
        return Uint8Array.from(bytes);
      }

      class GifEncoder {
        constructor(w, h, palette, delayCs) {
          this.w = w; this.h = h; this.delay = delayCs;
          this.parts = [];
          const head = [71, 73, 70, 56, 57, 97, // "GIF89a"
            w & 255, w >> 8, h & 255, h >> 8, 0xF7, 0, 0];
          for (let i = 0; i < 256; i++) {
            const p = palette[i] || [0, 0, 0];
            head.push(p[0], p[1], p[2]);
          }
          // 無限ループ（NETSCAPE 拡張）
          head.push(0x21, 0xFF, 0x0B,
            78, 69, 84, 83, 67, 65, 80, 69, 50, 46, 48, // "NETSCAPE2.0"
            3, 1, 0, 0, 0);
          this.parts.push(Uint8Array.from(head));
        }
        addFrame(indices) {
          this.parts.push(Uint8Array.from([
            0x21, 0xF9, 4, 0x04, this.delay & 255, this.delay >> 8, 0, 0, // GCE
            0x2C, 0, 0, 0, 0, this.w & 255, this.w >> 8, this.h & 255, this.h >> 8, 0, // 画像記述子
          ]));
          this.parts.push(lzwEncode(indices));
        }
        finish() {
          this.parts.push(Uint8Array.from([0x3B]));
          let len = 0;
          for (const p of this.parts) len += p.length;
          const out = new Uint8Array(len);
          let o = 0;
          for (const p of this.parts) { out.set(p, o); o += p.length; }
          return out;
        }
      }

      let gifBusy = false;
      async function exportGIF() {
        if (gifBusy) return;
        gifBusy = true;
        const label = "うごきを GIF で保存";
        try {
          if (state.points.length < 3) generatePoster();
          const P = (ANIM.playing && ANIM.params) ? ANIM.params : buildAnim();
          const wasPlaying = ANIM.playing;
          if (wasPlaying) { ANIM.playing = false; cancelAnimationFrame(ANIM.raf); }

          const FRAMES = 48, DELAY = 8; // 80ms × 48 = 約 3.8 秒のループ
          const gw = 480, gh = Math.max(1, Math.round(canvas.height / canvas.width * gw));
          const oc = document.createElement("canvas");
          oc.width = gw; oc.height = gh;
          const octx = oc.getContext("2d", { willReadFrequently: true });
          const k = gw / canvas.width;
          let artB = null, artS = null;
          if (ART.baseMarkup) {
            [artB, artS] = await Promise.all([
              rasterizeArt(ART.baseMarkup, gw, gh),
              rasterizeArt(ART.someMarkup, gw, gh),
            ]);
          }
          const renderFrame = w => {
            const F = computeFrame(P, w);
            octx.save();
            octx.filter = "none";
            octx.fillStyle = F.fillMode === "background" ? F.color : CREAM;
            octx.fillRect(0, 0, gw, gh);
            octx.restore();
            drawShapeInto(octx, canvas.width, k, F);
            if (artB) octx.drawImage(artB, 0, 0, gw, gh);
            if (artS) octx.drawImage(artS, state.someOff.x * k, state.someOff.y * k, gw, gh);
            return octx.getImageData(0, 0, gw, gh);
          };

          // 1) 代表フレームから 256 色パレットを作る
          gifBtn.textContent = "GIF を準備中…";
          await tick();
          const samples = [];
          for (let f = 0; f < FRAMES; f += 8) {
            const d = renderFrame(f / FRAMES).data;
            for (let i = 0; i < d.length; i += 36) samples.push([d[i], d[i + 1], d[i + 2]]);
            await tick();
          }
          const palette = medianCut(samples, 256);

          // 2) 各フレームをディザリングして符号化
          const enc = new GifEncoder(gw, gh, palette, DELAY);
          const cache = new Int16Array(32768).fill(-1);
          for (let f = 0; f < FRAMES; f++) {
            enc.addFrame(ditherToIndex(renderFrame(f / FRAMES), palette, cache));
            gifBtn.textContent = `GIF 書き出し中… ${Math.round((f + 1) / FRAMES * 100)}%`;
            await tick();
          }
          const blob = new Blob([enc.finish()], { type: "image/gif" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.download = `mono-ni-kokoro_motion_${Date.now().toString(36)}.gif`;
          a.href = url;
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 2000);

          if (wasPlaying) { ANIM.playing = true; ANIM.t0 = performance.now(); runAnimLoop(); animBtn.textContent = "とめる"; }
          else render();
        } catch (e) {
          console.error("GIF 書き出しに失敗:", e);
          showHint("GIF の書き出しに失敗しました");
        } finally {
          gifBtn.textContent = label;
          gifBusy = false;
        }
      }

      genBtn.onclick = generatePoster; // 再生中なら新しいパラメータで再スタート
      animBtn.onclick = () => { ANIM.playing ? stopAnim() : startAnim(); };
      gifBtn.onclick = exportGIF;
      document.querySelectorAll("#genmode button").forEach(b => {
        b.onclick = () => {
          setActiveBtn("#genmode", "gen", b.dataset.gen);
          GEN.mode = b.dataset.gen;
          generatePoster();
        };
      });

      // 検証・デバッグ用の小さな取っ手（UI からは見えない）
      window.__pm = { state, ANIM, GEN, generatePoster, startAnim, stopAnim, exportGIF, computeFrame, buildAnim };

      // ---------- init: フォント準備 → SVG 文字組みの読み込み ----------
      async function initArt() {
        try {
          const raws = await Promise.all(SIZES.map(s => fetchSvg(s.svg)));
          // 両 SVG で使う全グリフを集めてサブセット取得
          const chars = new Set(" ");
          for (const raw of raws) {
            const d = new DOMParser().parseFromString(raw, "image/svg+xml");
            d.querySelectorAll("text").forEach(t => { for (const ch of t.textContent) chars.add(ch); });
          }
          try {
            FONTCSS = await buildFontCss([...chars].join(""));
            // 当たり判定の実測（getBoundingClientRect）用に document 側にも同じフォントを注入
            const st = document.createElement("style");
            st.textContent = FONTCSS;
            document.head.appendChild(st);
          } catch (e) {
            FONTCSS = ""; // オフライン等ではフォールバックフォントで描画
          }
          await loadArt(state.size);
          render();
          // SVG 内フォントの適用が一拍遅れる環境向けに念のため再描画
          setTimeout(render, 300);
          setTimeout(render, 1200);
        } catch (e) {
          console.error("文字組み SVG の読み込みに失敗:", e);
          showHint("文字組みの読み込みに失敗しました");
        }
      }

      applySize();
      generatePoster(); // アクセスするたびに違う一枚（?seed=… で再現可能）
      initArt();
      showHint("きょうの一枚。なぞって 描きなおすこともできます");
    })();
  </script>
